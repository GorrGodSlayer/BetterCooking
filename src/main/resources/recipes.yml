# BetterCooking Recipes
#
# Ingredient format:
#   nexo:<nexo_item_id>:<amount>       — Nexo custom item
#   <MATERIAL>:<amount>                — Vanilla Minecraft item (e.g. BEEF:1)
#
# Result format (same as ingredients, plus an optional custom name for vanilla items):
#   <MATERIAL>:<amount>:<Display Name> — Vanilla item renamed with & colour codes
#
# needle-speed: ticks between each needle step. Lower = harder.
#   2  = very hard
#   4  = medium
#   8  = easy
#
# perfect-zone: unused — perfect is always the single dead-center slot. Kept
# here so old recipe files still load; feel free to remove it from your recipes.
#
# good-zone: slots on each side of the center that count as good.
#   2 = 2 slots each side (beyond the single perfect center) are good
#
# Batch cooking: if the slots hold a multiple of the ingredients (e.g. 5 beef
# for a 1-beef recipe), one cook processes the whole batch and multiplies the
# result. Fuel is charged per ingredient item, exactly like a furnace.
#
# Recipes created with /cooking add are written in a structured result format
# instead of the compact string above, so they can carry lore and an eat effect:
#
#   results:
#     perfect:
#       item: "COOKED_BEEF:1"        # or "nexo:<id>:<amount>"
#       name: "&6&lHeavenly Steak"   # optional
#       lore:                         # optional
#         - "&7A perfectly cooked steak"
#       effect:                       # optional — granted when the item is eaten
#         type: SPEED                 # e.g. SPEED, STRENGTH, REGENERATION, HASTE
#         amplifier: 0                # 0 = level I
#         duration: 200                # ticks (20 = 1 second)
#
# Both formats can be mixed freely between qualities/recipes in this same file.

steak:
  display-name: "Steak"
  ingredients:
    - BEEF:1
  results:
    perfect: "COOKED_BEEF:1:&6&lHeavenly Steak"
    good: "COOKED_BEEF:1:&eSteak"
    failed: "COOKED_BEEF:1:&8Burnt Steak"
  needle-speed: 3
  perfect-zone: 1
  good-zone: 2

roasted_potato:
  display-name: "Roasted Potato"
  ingredients:
    - POTATO:2
  results:
    perfect: BAKED_POTATO:3
    good: BAKED_POTATO:2
    failed: "CHARCOAL:1:&8Charred Potato"
  needle-speed: 5
  perfect-zone: 1
  good-zone: 2

